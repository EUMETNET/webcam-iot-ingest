name: iot-webcam-ingest

services:
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8009:8001"
    network_mode: ""
    environment:
      - MQTT_HOST=${MQTT_HOST:-mqtt}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TLS=${MQTT_TLS:-False}
      - MQTT_PROTOCOL_VERSION=${MQTT_PROTOCOL_VERSION:-5}
      - MQTT_TOPIC_PREPEND=${MQTT_TOPIC_PREPEND}
      - INGEST_LOGLEVEL
      - BUCKET_NAME=${BUCKET_NAME}
      - BUCKET_ACCESS_KEY_ID=${BUCKET_ACCESS_KEY_ID}
      - BUCKET_SECRET_ACCESS_KEY=${BUCKET_SECRET_ACCESS_KEY}
      - BUCKET_ENDPOINT_URL=${BUCKET_ENDPOINT_URL}
      - BUCKET_OBJECT_URL=${BUCKET_OBJECT_URL}
      - GUNICORN_CMD_ARGS=--bind 0.0.0.0:8001 --workers=4 --access-logfile -
    depends_on:
      mqtt:
        condition: service_healthy

  mqtt:
    image: eclipse-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto:/etc/mosquitto
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mosquitto-exporter:
    image: sapcc/mosquitto-exporter
    ports:
      - "9234:9234"
    environment:
      - "BROKER_ENDPOINT=tcp://mqtt:1883"
    restart: unless-stopped
    depends_on:
      - mqtt

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana-oss:11.2.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=mysecretpassword
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:rw
      - ./grafana/dashboards:/var/lib/grafana/dashboards:rw
    depends_on:
      - prometheus

volumes:
  grafana-storage:
  prometheus-data: