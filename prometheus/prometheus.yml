global:
  scrape_interval:     15s
  evaluation_interval: 15s
  query_log_file: /prometheus/query.log

scrape_configs:
  - job_name: prometheus
    static_configs:
        - targets: ["prometheus:9090"]
  - job_name: ingest
    static_configs:
      - targets: ["ingest:8001"]
  - job_name: mqtt-exporter
    static_configs:
      - targets: ["mosquitto-exporter:9234"]